server {
    listen 80;
    server_name _;

    root /var/www/fractal;
    index index.html;

    # Gzip compression (WASM compresses very well)
    gzip on;
    gzip_vary on;
    gzip_min_length 256;
    gzip_types
        application/wasm
        application/javascript
        application/json
        text/html
        text/css
        text/plain
        image/svg+xml;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Required for SharedArrayBuffer (WASM threading)
    add_header Cross-Origin-Opener-Policy "same-origin" always;
    add_header Cross-Origin-Embedder-Policy "require-corp" always;

    # WASM files - correct MIME type and long-term caching
    location ~* \.wasm$ {
        types { application/wasm wasm; }
        add_header Cache-Control "public, max-age=31536000, immutable";
        add_header Cross-Origin-Opener-Policy "same-origin" always;
        add_header Cross-Origin-Embedder-Policy "require-corp" always;
    }

    # Static assets caching
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|webp)$ {
        expires 7d;
        add_header Cache-Control "public, no-transform";
    }

    # HTML - short cache for updates
    location ~* \.html$ {
        expires 1h;
        add_header Cache-Control "public, no-transform";
    }

    # Proxy API requests to Node.js backend
    location /api/ {
        proxy_pass http://api:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Timeouts — 30s matches server-side limit
        proxy_read_timeout 35s;
        proxy_send_timeout 35s;

        # Conservative buffers for small instances
        proxy_buffering on;
        proxy_buffer_size 16k;
        proxy_buffers 2 64k;
    }

    # SPA fallback - serve index.html for unmatched routes
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Deny access to hidden files
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }
}
